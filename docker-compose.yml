version: '3.9'

services:
  ids:
    build: .
    container_name: ids-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ids-data:/app/data
      - ids-logs:/app/logs
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/ids.db
      BASELINE_FILE: /app/data/fim_baseline.json
      MONITOR_PATHS: /app/data/monitored
      LOG_PATHS: /var/log/auth.log,/var/log/syslog
      # Populate via a .env file or environment injection — do NOT hard-code secrets here
      # SMTP_HOST:
      # SMTP_PORT:
      # SMTP_USER:
      # SMTP_PASS:
      # ALERT_EMAIL_TO:
      # WEBHOOK_URL:
    # Give cap_net_raw only if packet capture is required
    cap_add:
      - NET_RAW
    network_mode: host   # required for raw packet capture on the host interface
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: ids-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

volumes:
  ids-data:
  ids-logs:
  redis-data:
